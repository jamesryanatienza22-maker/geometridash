<!DOCTYPE html>
<html>
<head>
<title>Geometry Dash - Clean Version</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial;
        color: white;
        text-align: center;
    }

    canvas {
        background: #111;
        display: block;
        margin: auto;
    }

    #flash {
        position: fixed;
        width: 100%;
        height: 100%;
        background: white;
        display: none;
        z-index: 9998;
    }

    #jumpscare {
        position: fixed;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
        z-index: 9999;
    }

    .shake {
        animation: shake 0.4s;
    }

    @keyframes shake {
        0% { transform: translate(10px, 10px); }
        25% { transform: translate(-10px, -10px); }
        50% { transform: translate(10px, -10px); }
        75% { transform: translate(-10px, 10px); }
        100% { transform: translate(0, 0); }
    }
</style>
</head>
<body>

<h2>Geometry Dash - Practice Mode</h2>
<p>Press SPACE to jump</p>

<canvas id="game" width="800" height="300"></canvas>

<div id="flash"></div>
<img id="jumpscare" src="jumpscare.jfif">
<audio id="scream" scr"scream.mp3">

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const jumpscare = document.getElementById("jumpscare");
const scream = document.getElementById("scream");
const flash = document.getElementById("flash");

let player = { x: 100, y: 250, size: 30, velocity: 0 };
let gravity = 0.8;
let obstacles = [];
let speed = 5;
let distance = 0;
let gameOver = false;

function createObstacle(x) {
    obstacles.push({ x: x, y: 250, width: 20, height: 50 });
}

for (let i = 1; i < 8; i++) {
    createObstacle(i * 400);
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space" && player.y >= 250) {
        player.velocity = -15;
    }
});

function triggerJumpscare() {
    gameOver = true;

    flash.style.display = "block";
    setTimeout(() => {
        flash.style.display = "none";
        canvas.style.display = "none";
        document.querySelector("h2").style.display = "none";
        document.querySelector("p").style.display = "none";

        jumpscare.style.display = "block";
        document.body.classList.add("shake");

        scream.volume = 0.8; // loud but not dangerous
        scream.play();
    }, 100);
}

function update() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    player.velocity += gravity;
    player.y += player.velocity;

    if (player.y > 250) {
        player.y = 250;
        player.velocity = 0;
    }

    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    obstacles.forEach(ob => {
        ob.x -= speed;
        ctx.fillStyle = "red";
        ctx.fillRect(ob.x, ob.y, ob.width, ob.height);

        if (
            player.x < ob.x + ob.width &&
            player.x + player.size > ob.x &&
            player.y < ob.y + ob.height &&
            player.y + player.size > ob.y
        ) {
            triggerJumpscare();
        }
    });

    distance += speed;

    if (distance > 1500 && Math.random() < 0.005) {
        triggerJumpscare();
    }

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
